
<!-- NOTE: PURELY VIBE CODED UI != FRONTEND DEV -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'sans-serif'],
          mono: ['Geist Mono', 'monospace'],
        },
        colors: {
          zinc: {
            925: '#09090b',
            875: '#111113',
            825: '#18181b',
          }
        },
        keyframes: {
          slideIn: { from: { opacity: 0, transform: 'translateY(4px)' }, to: { opacity: 1, transform: 'none' } },
          fadeUp:  { from: { opacity: 0, transform: 'translateY(6px)' }, to: { opacity: 1, transform: 'none' } },
          spin:    { to: { transform: 'rotate(360deg)' } },
          shimPbar:{ '0%,100%': { opacity: 0.4 }, '50%': { opacity: 1 } },
        },
        animation: {
          slideIn: 'slideIn 0.2s ease forwards',
          fadeUp:  'fadeUp 0.3s ease forwards',
          spin:    'spin 0.85s linear infinite',
          shimPbar:'shimPbar 1.2s ease-in-out infinite',
        }
      }
    }
  }
</script>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans text-sm antialiased min-h-screen">

<div class="max-w-xl mx-auto px-4 py-12 pb-20">

  <!-- Header -->
  <div class="mb-7 animate-fadeUp">
    <div class="flex items-center gap-2 mb-3">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L3 5.5v5c0 4.142 3.134 8.02 7 9 3.866-.98 7-4.858 7-9v-5L10 2z"
          stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7 10.5l2.2 2.2 3.8-4.4" stroke="#3b82f6" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="font-mono text-xs text-zinc-500 tracking-wider">Apollo / v1</span>
    </div>
    <h1 class="text-3xl font-bold tracking-tight text-zinc-50 leading-tight">URL Security Scanner</h1>
    <p class="mt-1.5 text-zinc-500 text-[13px] leading-relaxed">
      Analyze any URL for vulnerabilities, misconfigurations, and threat indicators.
    </p>
  </div>

  <!-- Input card -->
  <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-3">
    <label class="block font-mono text-[10px] font-medium text-zinc-500 uppercase tracking-widest mb-2">
      Target URL
    </label>
    <div class="flex gap-2">
      <input id="urlInput" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false"
        class="flex-1 bg-zinc-950 border border-zinc-800 text-zinc-100 font-mono text-[13px]
               rounded-lg px-3.5 py-2.5 outline-none placeholder-zinc-700
               focus:border-zinc-600 focus:ring-2 focus:ring-white/5 transition-all" />
      <button id="scanBtn" onclick="startScan()"
        class="bg-zinc-50 text-zinc-950 font-semibold text-[13px] tracking-tight
               px-5 py-2.5 rounded-lg whitespace-nowrap
               hover:bg-white transition-opacity disabled:opacity-30 disabled:cursor-not-allowed
               active:scale-[0.98]">
        Scan
      </button>
    </div>
    <div class="flex gap-1.5 mt-3 flex-wrap">
      <button onclick="setUrl('https://example.com')"
        class="bg-zinc-825 border border-zinc-800 text-zinc-500 font-mono text-[11px]
               px-2.5 py-1 rounded-md hover:border-zinc-600 hover:text-zinc-300 transition-all">
        example.com
      </button>
      <button onclick="setUrl('http://neverssl.com')"
        class="bg-zinc-825 border border-zinc-800 text-zinc-500 font-mono text-[11px]
               px-2.5 py-1 rounded-md hover:border-zinc-600 hover:text-zinc-300 transition-all">
        no-ssl demo
      </button>
      <button onclick="setUrl('https://login-paypal-secure.xyz/verify?redirect=http://evil.com')"
        class="bg-zinc-825 border border-zinc-800 text-zinc-500 font-mono text-[11px]
               px-2.5 py-1 rounded-md hover:border-zinc-600 hover:text-zinc-300 transition-all">
        phishing demo
      </button>
      <button onclick="setUrl('https://site.com?q=<script>alert(1)</script>')"
        class="bg-zinc-825 border border-zinc-800 text-zinc-500 font-mono text-[11px]
               px-2.5 py-1 rounded-md hover:border-zinc-600 hover:text-zinc-300 transition-all">
        xss demo
      </button>
    </div>
  </div>

  <!-- Scanning view -->
  <div id="scanView" class="hidden bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-3">
    <div class="flex items-center gap-2.5 mb-4">
      <svg class="animate-spin shrink-0" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="#27272a" stroke-width="2.2"/>
        <path d="M7 1.5a5.5 5.5 0 0 1 5.5 5.5" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span class="text-[13px] font-medium text-zinc-100">Scanning</span>
      <span id="scanTarget" class="font-mono text-[11px] text-zinc-500 ml-auto truncate max-w-[200px]"></span>
    </div>
    <div id="scanBars" class="flex flex-col gap-2 mb-4"></div>
    <div id="termLines" class="flex flex-col gap-0.5 min-h-[52px]"></div>
  </div>

  <!-- Results -->
  <div id="resultsView" class="hidden">

    <!-- Summary -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-3 animate-fadeUp">
      <div class="flex items-center gap-4">
        <!-- Ring -->
        <div class="relative w-20 h-20 shrink-0">
          <svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg);position:absolute;inset:0;">
            <circle cx="40" cy="40" r="33" fill="none" stroke="#27272a" stroke-width="5"/>
            <circle id="ringArc" cx="40" cy="40" r="33" fill="none" stroke="#3b82f6"
              stroke-width="5" stroke-linecap="round"
              stroke-dasharray="207.3" stroke-dashoffset="207.3"
              style="transition:stroke-dashoffset 1.1s cubic-bezier(0.4,0,0.2,1),stroke 0.5s;"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span id="scoreNum" class="text-[22px] font-bold tracking-tight text-zinc-50">—</span>
            <span class="font-mono text-[9px] text-zinc-500">/100</span>
          </div>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span id="riskTitle" class="text-[15px] font-semibold tracking-tight text-zinc-50"></span>
            <span id="riskBadge" class="font-mono text-[10px] font-medium px-1.5 py-0.5 rounded border uppercase tracking-widest"></span>
          </div>
          <p id="summaryText" class="text-[12px] text-zinc-500 leading-relaxed"></p>
          <p id="urlDisplay" class="font-mono text-[10px] text-zinc-700 mt-1.5 truncate"></p>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-zinc-800">
        <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-center">
          <div id="cHigh" class="text-[20px] font-bold tracking-tight text-red-500">0</div>
          <div class="text-[11px] text-zinc-500 mt-0.5">Critical</div>
        </div>
        <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-center">
          <div id="cMed" class="text-[20px] font-bold tracking-tight text-amber-500">0</div>
          <div class="text-[11px] text-zinc-500 mt-0.5">Warning</div>
        </div>
        <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-center">
          <div id="cLow" class="text-[20px] font-bold tracking-tight text-zinc-400">0</div>
          <div class="text-[11px] text-zinc-500 mt-0.5">Low</div>
        </div>
        <div class="bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-center">
          <div id="cInfo" class="text-[20px] font-bold tracking-tight text-blue-400">0</div>
          <div class="text-[11px] text-zinc-500 mt-0.5">Info</div>
        </div>
      </div>
    </div>

    <!-- Findings -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl mb-3 overflow-hidden animate-fadeUp">
      <div class="flex items-center justify-between px-4 pt-4 pb-2">
        <span class="text-[13px] font-semibold tracking-tight">Findings</span>
        <span id="findingsCount" class="font-mono text-[11px] text-zinc-500"></span>
      </div>
      <div id="findingsList"></div>
    </div>

    <!-- Headers -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-3 animate-fadeUp">
      <div class="flex items-center justify-between mb-3.5">
        <span class="text-[13px] font-semibold tracking-tight">Security Headers</span>
        <span id="hdrScore" class="font-mono text-[10px] font-medium px-1.5 py-0.5 rounded border uppercase tracking-widest"></span>
      </div>
      <div id="headerList" class="flex flex-col"></div>
    </div>

    <!-- OSINT / Infrastructure -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-3 animate-fadeUp">
      <div class="flex items-center justify-between mb-3.5">
        <span class="text-[13px] font-semibold tracking-tight">Infrastructure</span>
        <span id="osintBadge" class="font-mono text-[10px] font-medium px-1.5 py-0.5 rounded border uppercase tracking-widest text-zinc-400 bg-zinc-800 border-zinc-700">
          OSINT
        </span>
      </div>

      <div id="osintGrid" class="grid grid-cols-2 gap-2"></div>
    </div>

    <!-- URL Breakdown -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-5 mb-5 animate-fadeUp">
      <div class="text-[13px] font-semibold tracking-tight mb-3.5">URL Breakdown</div>
      <div id="urlBreakdown" class="grid grid-cols-2 gap-2"></div>
    </div>

    <button onclick="resetScan()"
      class="w-full bg-transparent border border-zinc-800 text-zinc-500 font-medium text-[13px]
             py-2.5 rounded-lg hover:bg-zinc-825 hover:text-zinc-200 hover:border-zinc-700 transition-all">
      ↩ &nbsp;Scan another URL
    </button>
  </div>

</div>
<script src="./static/main.js"></script>
</body>
</html>
